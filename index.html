<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Pool 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --green-dark: #009624;
    --green-dim: #00c85322;
    --gold: #ffd600;
    --red: #e53935;
    --bg: #0a0f0a;
    --bg2: #111811;
    --bg3: #182018;
    --border: #ffffff18;
    --border-bright: #ffffff35;
    --text: #f0f4f0;
    --text-muted: #7a9a7a;
    --text-dim: #3a5a3a;
    --fav-bg: #0a2a1a;
    --fav-border: #00c85355;
    --fav-text: #00e676;
    --draw-bg: #2a2000;
    --draw-border: #ffd60055;
    --draw-text: #ffd600;
    --upset-bg: #2a0a0a;
    --upset-border: #e5393555;
    --upset-text: #ff6659;
    --sel-fav-bg: #00c853;
    --sel-fav-text: #002a10;
    --sel-draw-bg: #ffd600;
    --sel-draw-text: #2a1a00;
    --sel-upset-bg: #e53935;
    --sel-upset-text: #fff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; min-height: 100vh; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.04em; color: var(--green); }
  .logo span { color: var(--text); }
  .header-player { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .header-player strong { color: var(--text); }
  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .screen { display: none; }
  .screen.active { display: block; }
  .join-hero { text-align: center; padding: 2rem 0 2.5rem; }
  .join-hero h1 { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(36px, 8vw, 64px); font-weight: 700; letter-spacing: 0.02em; line-height: 1; margin-bottom: 0.5rem; }
  .join-hero h1 em { color: var(--green); font-style: normal; }
  .join-hero p { color: var(--text-muted); font-size: 15px; }
  .deadline-banner { background: var(--draw-bg); border: 1px solid var(--draw-border); border-radius: 8px; padding: 10px 16px; margin-bottom: 1rem; font-size: 13px; color: var(--draw-text); text-align: center; max-width: 420px; margin-left: auto; margin-right: auto; }
  .deadline-passed { background: var(--upset-bg); border-color: var(--upset-border); color: var(--upset-text); }
  .join-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; max-width: 420px; margin: 0 auto 1.5rem; }
  .join-card label { display: block; font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .join-card input[type=text], .join-card input[type=password] { width: 100%; background: var(--bg3); border: 1px solid var(--border-bright); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 16px; font-family: 'Barlow', sans-serif; outline: none; transition: border-color 0.2s; }
  .join-card input[type=text]:focus, .join-card input[type=password]:focus { border-color: var(--green); }
  .err-msg { font-size: 12px; color: var(--upset-text); margin-top: 5px; min-height: 18px; }
  .btn-primary { width: 100%; margin-top: 14px; background: var(--green); color: #001a08; border: none; border-radius: 8px; padding: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .btn-primary:hover { background: #00e676; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: var(--text-dim); color: var(--bg3); cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border-bright); border-radius: 8px; padding: 9px 18px; color: var(--text-muted); font-family: 'Barlow', sans-serif; font-size: 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
  .players-list { max-width: 420px; margin: 0 auto; }
  .players-list h3 { font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .player-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border-bright); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: var(--green); flex-shrink: 0; }
  .player-name { flex: 1; font-size: 14px; font-weight: 500; }
  .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.04em; }
  .status-submitted { background: var(--green-dim); color: var(--green); border: 1px solid var(--fav-border); }
  .status-pending { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .edit-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: border-color 0.15s; }
  .edit-btn:hover { border-color: var(--green); color: var(--green); }
  .bracket-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .bracket-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; }
  .bracket-title span { color: var(--green); }
  .progress-bar-track { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; width: 200px; max-width: 100%; }
  .progress-bar-fill { height: 3px; background: var(--green); border-radius: 2px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .bracket-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .group-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; }
  .group-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
  .match-row { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; font-size: 12px; }
  .t-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .t-name.right { text-align: right; }
  .pick-btn { padding: 3px 7px; border-radius: 5px; font-size: 10px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; white-space: nowrap; transition: all 0.12s; border: 1px solid transparent; }
  .pick-btn.fav { background: var(--fav-bg); color: var(--fav-text); border-color: var(--fav-border); }
  .pick-btn.draw { background: var(--draw-bg); color: var(--draw-text); border-color: var(--draw-border); }
  .pick-btn.upset { background: var(--upset-bg); color: var(--upset-text); border-color: var(--upset-border); }
  .pick-btn.sel-fav { background: var(--sel-fav-bg); color: var(--sel-fav-text); border-color: var(--sel-fav-bg); }
  .pick-btn.sel-draw { background: var(--sel-draw-bg); color: var(--sel-draw-text); border-color: var(--sel-draw-bg); }
  .pick-btn.sel-upset { background: var(--sel-upset-bg); color: var(--sel-upset-text); border-color: var(--sel-upset-bg); }
  .pick-btn.disabled { opacity: 0.4; cursor: not-allowed; }
  .lb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .lb-header h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; }
  .pot-strip { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .pot-chip { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; color: var(--text-muted); }
  .pot-chip strong { color: var(--text); font-size: 15px; }
  .lb-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .lb-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .lb-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-table tr:hover td { background: var(--bg2); }
  .rank-num { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-dim); width: 32px; }
  .rank-num.top { color: var(--gold); }
  .admin-section { max-width: 420px; margin: 2rem auto 0; }
  .delete-btn { background: var(--upset-bg); border: 1px solid var(--upset-border); color: var(--upset-text); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .delete-btn:hover { background: var(--red); color: #fff; }
  @media (max-width: 500px) { main { padding: 1.25rem 1rem 3rem; } .groups-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">WORLD<span>CUP</span> POOL</div>
  <div class="header-player" id="header-player"></div>
</header>

<main>
  <!-- JOIN SCREEN -->
  <div id="screen-join" class="screen active">
    <div class="join-hero">
      <h1>2026 <em>World Cup</em><br>Group Stage Pool</h1>
      <p>Pick results for all 48 matches. Upsets pay more.</p>
    </div>
    <div id="deadline-banner" class="deadline-banner"></div>
    <div id="join-form-wrap" class="join-card">
      <label for="name-input">Your name</label>
      <input type="text" id="name-input" placeholder="e.g. Jamie" maxlength="30" autocomplete="off">
      <div class="err-msg" id="join-err"></div>
      <button class="btn-primary" id="join-btn" onclick="handleJoin()">Join &amp; fill my bracket</button>
      <div style="margin-top:10px;text-align:center;">
        <button class="btn-ghost" onclick="showLeaderboard()">View leaderboard</button>
      </div>
    </div>
    <div class="players-list" id="players-list-area"></div>
    <div class="admin-section">
      <button class="btn-ghost" onclick="toggleAdmin()" style="font-size:12px;padding:6px 14px;">Admin</button>
      <div id="admin-area" style="display:none;margin-top:1rem;">
        <div class="join-card" style="margin:0 0 1rem;">
          <label>Admin password</label>
          <input type="password" id="admin-pw" placeholder="Enter password">
          <div class="err-msg" id="admin-err"></div>
          <button class="btn-primary" onclick="checkAdmin()">Unlock</button>
        </div>
        <div id="admin-players"></div>
      </div>
    </div>
  </div>

  <!-- BRACKET SCREEN -->
  <div id="screen-bracket" class="screen">
    <div class="bracket-header">
      <div>
        <div class="bracket-title">Bracket — <span id="bracket-name-label"></span></div>
        <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div class="progress-label" id="progress-label">0 / 0 predicted</div>
      </div>
      <div class="bracket-actions">
        <button class="btn-ghost" onclick="showJoin()">Back</button>
        <button class="btn-primary" id="submit-btn" style="width:auto;margin-top:0;padding:10px 22px;" onclick="handleSubmit()">Submit bracket</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;font-size:12px;">
      <span style="color:var(--fav-text);">&#9679; Favourite win = 1pt</span>
      <span style="color:var(--draw-text);">&#9679; Draw = 3pts</span>
      <span style="color:var(--upset-text);">&#9679; Upset win = 5pts</span>
    </div>
    <div id="deadline-bracket-msg" style="margin-bottom:1rem;"></div>
    <div class="groups-grid" id="groups-grid"></div>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div id="screen-lb" class="screen">
    <div class="lb-header">
      <h2>Leaderboard</h2>
      <button class="btn-ghost" onclick="showJoin()">Back</button>
    </div>
    <div class="pot-strip" id="pot-strip"></div>
    <div id="lb-content"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://crlgedrtiazjswdudzbb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_lxGer1N_8_kSio9j_bKMMg_--vt_ZtM';
const BUYIN = 20;
const DEADLINE = new Date('2026-06-10T23:59:59');
const ADMIN_PASSWORD = 'deadlinepw';

const GROUPS = [
  {name:"Group A",teams:["Mexico","South Africa","South Korea","Czechia"]},
  {name:"Group B",teams:["Canada","Bosnia and Herzegovina","Qatar","Switzerland"]},
  {name:"Group C",teams:["Brazil","Morocco","Haiti","Scotland"]},
  {name:"Group D",teams:["USA","Paraguay","Australia","Turkiye"]},
  {name:"Group E",teams:["Germany","Curacao","Ivory Coast","Ecuador"]},
  {name:"Group F",teams:["Netherlands","Japan","Sweden","Tunisia"]},
  {name:"Group G",teams:["Belgium","Egypt","Iran","New Zealand"]},
  {name:"Group H",teams:["Spain","Cape Verde","Saudi Arabia","Uruguay"]},
  {name:"Group I",teams:["France","Senegal","Norway","Iraq"]},
  {name:"Group J",teams:["Argentina","Algeria","Austria","Jordan"]},
  {name:"Group K",teams:["Portugal","DR Congo","Uzbekistan","Colombia"]},
  {name:"Group L",teams:["England","Croatia","Ghana","Panama"]}
];

const PTS_FAV = 1, PTS_DRAW = 3, PTS_UPSET = 5;
const TOTAL_MATCHES = GROUPS.reduce(function(s,g){ var t=g.teams.length; return s+t*(t-1)/2; }, 0);

var supabaseClient = null;
var currentPlayer = null;
var currentPicks = {};
var allPlayers = [];
var adminUnlocked = false;

function isPastDeadline(){ return new Date() > DEADLINE; }

function getMatches(teams){
  var m=[];
  for(var i=0;i<teams.length;i++)
    for(var j=i+1;j<teams.length;j++)
      m.push([teams[i],teams[j]]);
  return m;
}
function isFav(team,teams){ return teams.indexOf(team)<2; }
function initials(name){ return name.trim().split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2)||'??'; }

async function init(){
  renderDeadlineBanner();
  try{
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadPlayers();
  } catch(e){
    console.error('Supabase init error:', e);
  }
}

function renderDeadlineBanner(){
  var el = document.getElementById('deadline-banner');
  if(!el) return;
  var now = new Date();
  var diff = DEADLINE - now;
  if(diff <= 0){
    el.textContent = 'Deadline passed — brackets are locked.';
    el.className = 'deadline-banner deadline-passed';
    el.style.display = 'block';
    var jf = document.getElementById('join-form-wrap');
    if(jf) jf.style.display = 'none';
  } else {
    var days = Math.floor(diff/86400000);
    var hrs = Math.floor((diff%86400000)/3600000);
    el.textContent = 'Deadline: June 10, 2026 at midnight — ' + days + ' days ' + hrs + ' hrs remaining';
    el.className = 'deadline-banner';
    el.style.display = 'block';
  }
}

async function loadPlayers(){
  var result = await supabaseClient.from('players').select('name, picks, submitted').order('created_at');
  if(result.error){ console.error(result.error); return; }
  allPlayers = result.data || [];
  renderPlayersList();
}

function renderPlayersList(){
  var area = document.getElementById('players-list-area');
  if(allPlayers.length === 0){ area.innerHTML=''; return; }
  var html = '<h3 style="margin-top:1.5rem;">' + allPlayers.length + ' player' + (allPlayers.length>1?'s':'') + ' joined</h3>';
  for(var i=0;i<allPlayers.length;i++){
    var p = allPlayers[i];
    html += '<div class="player-row">';
    html += '<div class="avatar">' + initials(p.name) + '</div>';
    html += '<div class="player-name">' + p.name + '</div>';
    html += '<span class="status-badge ' + (p.submitted?'status-submitted':'status-pending') + '">' + (p.submitted?'Submitted':'In progress') + '</span>';
    if(!isPastDeadline()){
      html += '<button class="edit-btn" onclick="loadBracket(\'' + p.name.replace(/'/g,"\\'") + '\')">Edit</button>';
    }
    html += '</div>';
  }
  area.innerHTML = html;
}

async function handleJoin(){
  if(isPastDeadline()){
    document.getElementById('join-err').textContent = 'The deadline has passed. Brackets are locked.';
    return;
  }
  var name = document.getElementById('name-input').value.trim();
  var err = document.getElementById('join-err');
  err.textContent = '';
  if(!name){ err.textContent='Please enter your name.'; return; }
  if(name.length>30){ err.textContent='Name too long (max 30 characters).'; return; }
  var btn = document.getElementById('join-btn');
  btn.disabled=true; btn.textContent='Loading...';
  var existing = null;
  for(var i=0;i<allPlayers.length;i++){
    if(allPlayers[i].name.toLowerCase()===name.toLowerCase()){ existing=allPlayers[i]; break; }
  }
  if(!existing){
    var ins = await supabaseClient.from('players').insert({name:name, picks:{}, submitted:false});
    if(ins.error && ins.error.code !== '23505'){
      err.textContent='Error joining. Try again.';
      btn.disabled=false; btn.textContent='Join & fill my bracket';
      return;
    }
    await loadPlayers();
  }
  loadBracket(existing ? existing.name : name);
  btn.disabled=false; btn.textContent='Join & fill my bracket';
}

function loadBracket(name){
  var player = null;
  for(var i=0;i<allPlayers.length;i++){ if(allPlayers[i].name===name){ player=allPlayers[i]; break; } }
  currentPlayer = name;
  currentPicks = player ? JSON.parse(JSON.stringify(player.picks||{})) : {};
  document.getElementById('bracket-name-label').textContent = name;
  document.getElementById('header-player').innerHTML = 'Playing as <strong>' + name + '</strong>';
  var deadlineMsg = document.getElementById('deadline-bracket-msg');
  if(isPastDeadline()){
    deadlineMsg.innerHTML = '<div style="background:var(--upset-bg);border:1px solid var(--upset-border);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--upset-text);">Deadline passed — viewing only, no changes allowed.</div>';
    var sb = document.getElementById('submit-btn');
    if(sb) sb.style.display='none';
  } else {
    deadlineMsg.innerHTML='';
    var sb = document.getElementById('submit-btn');
    if(sb) sb.style.display='';
  }
  renderGroups();
  updateProgress();
  showScreen('bracket');
}

function renderGroups(){
  var locked = isPastDeadline();
  var html = '';
  for(var gi=0;gi<GROUPS.length;gi++){
    var g = GROUPS[gi];
    var matches = getMatches(g.teams);
    html += '<div class="group-card"><div class="group-label">' + g.name + '</div>';
    for(var mi=0;mi<matches.length;mi++){
      var m = matches[mi];
      var key = g.name+'-'+mi;
      var pick = currentPicks[key]||null;
      var hFav = isFav(m[0],g.teams), aFav = isFav(m[1],g.teams);
      var hClass = hFav?'fav':'upset', aClass = aFav?'fav':'upset';
      var hPts = hFav?PTS_FAV:PTS_UPSET, aPts = aFav?PTS_FAV:PTS_UPSET;
      var hSel = pick===m[0]?(hFav?'sel-fav':'sel-upset'):hClass;
      var drawSel = pick==='draw'?'sel-draw':'draw';
      var aSel = pick===m[1]?(aFav?'sel-fav':'sel-upset'):aClass;
      var dis = locked?' disabled':'';
      var disClass = locked?' disabled':'';
      html += '<div class="match-row">';
      html += '<span class="t-name" title="'+m[0]+'">'+m[0]+'</span>';
      html += '<button class="pick-btn '+hSel+disClass+'"'+dis+' onclick="setPick(\''+g.name+'\','+mi+',\''+m[0]+'\')">'+hPts+'pt</button>';
      html += '<button class="pick-btn '+drawSel+disClass+'"'+dis+' onclick="setPick(\''+g.name+'\','+mi+',\'draw\')">'+PTS_DRAW+'pt</button>';
      html += '<button class="pick-btn '+aSel+disClass+'"'+dis+' onclick="setPick(\''+g.name+'\','+mi+',\''+m[1]+'\')">'+aPts+'pt</button>';
      html += '<span class="t-name right" title="'+m[1]+'">'+m[1]+'</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  document.getElementById('groups-grid').innerHTML = html;
}

function setPick(gname,mi,val){
  if(isPastDeadline()) return;
  var key = gname+'-'+mi;
  currentPicks[key] = val;
  for(var i=0;i<allPlayers.length;i++){
    if(allPlayers[i].name===currentPlayer){ allPlayers[i].picks=currentPicks; break; }
  }
  supabaseClient.from('players').update({picks:currentPicks}).eq('name',currentPlayer).then(function(){});
  renderGroups();
  updateProgress();
}

function updateProgress(){
  var done = Object.keys(currentPicks).length;
  var pct = Math.round(done/TOTAL_MATCHES*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-label').textContent = done+' of '+TOTAL_MATCHES+' matches predicted ('+pct+'%)';
}

async function handleSubmit(){
  if(isPastDeadline()) return;
  var done = Object.keys(currentPicks).length;
  if(done<TOTAL_MATCHES){
    if(!confirm('You have only predicted '+done+' of '+TOTAL_MATCHES+' matches. Submit anyway?')) return;
  }
  for(var i=0;i<allPlayers.length;i++){
    if(allPlayers[i].name===currentPlayer){ allPlayers[i].picks=currentPicks; allPlayers[i].submitted=true; break; }
  }
  await supabaseClient.from('players').update({picks:currentPicks,submitted:true}).eq('name',currentPlayer);
  alert(currentPlayer+"'s bracket submitted! Good luck!");
  showJoin();
}

async function showLeaderboard(){
  await loadPlayers();
  renderLeaderboard();
  showScreen('lb');
}

function renderLeaderboard(){
  var pot = allPlayers.length * BUYIN;
  document.getElementById('pot-strip').innerHTML =
    '<div class="pot-chip">Players <strong>'+allPlayers.length+'</strong></div>'+
    '<div class="pot-chip">Total pot <strong>$'+pot+'</strong></div>'+
    '<div class="pot-chip">Buy-in <strong>$'+BUYIN+'</strong></div>'+
    '<div class="pot-chip">1st <strong>$'+Math.round(pot*0.6)+'</strong></div>'+
    '<div class="pot-chip">2nd <strong>$'+Math.round(pot*0.3)+'</strong></div>'+
    '<div class="pot-chip">3rd <strong>$'+Math.round(pot*0.1)+'</strong></div>';
  var rows = allPlayers.slice().sort(function(a,b){
    return Object.keys(b.picks||{}).length - Object.keys(a.picks||{}).length;
  });
  if(rows.length===0){
    document.getElementById('lb-content').innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-muted);">No players yet.</div>';
    return;
  }
  var html = '<table class="lb-table"><thead><tr><th>#</th><th>Player</th><th style="text-align:right;">Predictions</th><th style="text-align:right;">Status</th></tr></thead><tbody>';
  for(var i=0;i<rows.length;i++){
    var p=rows[i], done=Object.keys(p.picks||{}).length;
    html += '<tr>';
    html += '<td><div class="rank-num '+(i<3?'top':'')+'">'+( i+1)+'</div></td>';
    html += '<td><div style="display:flex;align-items:center;gap:10px;"><div class="avatar">'+initials(p.name)+'</div><span style="font-weight:500;">'+p.name+'</span></div></td>';
    html += '<td style="text-align:right;color:var(--text-muted);font-size:13px;">'+done+' / '+TOTAL_MATCHES+'</td>';
    html += '<td style="text-align:right;"><span class="status-badge '+(p.submitted?'status-submitted':'status-pending')+'">'+(p.submitted?'Submitted':'In progress')+'</span></td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('lb-content').innerHTML = html;
}

function toggleAdmin(){
  var a = document.getElementById('admin-area');
  a.style.display = a.style.display==='none' ? 'block' : 'none';
}

function checkAdmin(){
  var pw = document.getElementById('admin-pw').value;
  if(pw !== ADMIN_PASSWORD){ document.getElementById('admin-err').textContent='Wrong password.'; return; }
  document.getElementById('admin-err').textContent='';
  adminUnlocked = true;
  renderAdminPlayers();
}

function renderAdminPlayers(){
  if(!adminUnlocked) return;
  var area = document.getElementById('admin-players');
  if(allPlayers.length===0){ area.innerHTML='<p style="font-size:13px;color:var(--text-muted);">No players yet.</p>'; return; }
  var html = '<p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Delete players</p>';
  for(var i=0;i<allPlayers.length;i++){
    var p=allPlayers[i];
    html += '<div class="player-row">';
    html += '<div class="avatar">'+initials(p.name)+'</div>';
    html += '<span style="flex:1;font-size:14px;">'+p.name+'</span>';
    html += '<button class="delete-btn" onclick="deletePlayer(\''+p.name.replace(/'/g,"\\'")+'\')">Delete</button>';
    html += '</div>';
  }
  area.innerHTML = html;
}

async function deletePlayer(name){
  if(!confirm('Delete '+name+'? This cannot be undone.')) return;
  await supabaseClient.from('players').delete().eq('name',name);
  allPlayers = allPlayers.filter(function(p){ return p.name!==name; });
  renderAdminPlayers();
  renderPlayersList();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+id).classList.add('active');
}
function showJoin(){
  loadPlayers();
  showScreen('join');
}

init();
</script>
</body>
</html>
